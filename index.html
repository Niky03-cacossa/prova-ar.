<!DOCTYPE html>
<html>
  <head>
    <title>Tesi AR Nicole</title>
    <!-- Importazione librerie stabili per WebAR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    <!-- Avvio della scena AR con fotocamera attiva -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Caricamento del tuo file 3D -->
      <a-assets>
        <a-asset-item id="cuboBlender" src="cubo.glb"></a-asset-item>
      </a-assets>

      <!-- Collegamento al tuo file di tracciamento rinominato -->
      <a-marker type="pattern" url="marker.patt">
        
        <!-- Mostra il cubo sopra il marker (scala impostata a 1) -->
        <a-entity gltf-model="#cuboBlender" scale="1 1 1" position="0 0 0" rotation="0 0 0"></a-entity>
        
      </a-marker>
      
      <!-- Entità telecamera necessaria per il funzionamento -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
